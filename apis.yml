aid: track-pod
name: Track-POD
description: >-
  Track-POD is a cloud-based delivery management platform that combines route planning and optimization with electronic
  proof of delivery (ePOD), driver tracking, and last-mile customer notifications. The platform serves 10,000+ companies
  globally with a freemium model — the mobile driver app is free on iOS and Android, while the web dispatcher dashboard
  is sold on per-driver (Advanced, Advanced Plus, Ultimate, Enterprise) and per-order (S, M, L, XL) plans. Track-POD
  exposes a documented REST API (Track-POD API 2.0) with an OpenAPI 3.0 specification, JSON and XML payloads, X-API-KEY
  authentication, a public sandbox environment, and webhooks for ten event types covering orders, routes, and statuses.
  Common use cases include automated order import from e-commerce platforms (WooCommerce, Magento, Shopify, BigCommerce)
  and accounting/CRM systems (QuickBooks, Xero, Zoho, Microsoft Dynamics, Salesforce), real-time route dispatch and
  tracking, geotagged and signed proof of delivery, and PDF/shipping-label generation. Track-POD also ships no-code
  integrations via Zapier and Integrately.
