apis:
  - aid: track-pod:track-pod-api
    name: Track-POD API
    description: >-
      Track-POD API 2.0 is a JSON/XML REST API for delivery management. It covers eight resource families — Address,
      Driver, Order, RejectReason, Route, Test, Vehicle, and VehicleCheck — across 58 operations. Authentication uses an
      X-API-KEY header issued from Settings > Integrations > Web API. The same surface is offered against a sandbox
      tenant at api.sandbox.track-pod.com. Rate limits are 20 requests per second / 400 requests per minute. Restricted
      API keys can be scoped by IP address, HTTP method, and domain.
    humanURL: https://api.track-pod.com/index.html
