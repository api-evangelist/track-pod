naftiko: 1.0.0-alpha2
info:
  label: Track-POD — Vehicle Checks
  description: 'Track-POD VehicleCheck capability. Retrieve driver walk-around inspections by vehicle number or date.'
  tags:
    - Track-POD
    - Vehicle Checks
    - Safety
    - Compliance
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      TRACK_POD_API_KEY: TRACK_POD_API_KEY
capability:
  consumes:
    - type: http
      namespace: vehicle-checks
      baseUri: https://api.track-pod.com
      description: Track-POD VehicleCheck REST surface.
      resources:
        - name: vehicle-check-by-number
          path: /VehicleCheck/{number}
          operations:
            - name: getLastVehicleCheck
              method: GET
              description: Get the last vehicle check for a vehicle number
              inputParameters:
                - name: number
                  in: path
                  type: string
                  required: true
        - name: vehicle-checks-by-date
          path: /VehicleCheck/Date/{date}
          operations:
            - name: getVehicleChecksByDate
              method: GET
              description: Get vehicle checks for a specific date
              inputParameters:
                - name: date
                  in: path
                  type: string
                  required: true
        - name: vehicle-checks-by-number-and-date
          path: /VehicleCheck/Number/{number}/Date/{date}
          operations:
            - name: getVehicleChecksByNumberAndDate
              method: GET
              description: Get vehicle checks for a vehicle number on a specific date
              inputParameters:
                - name: number
                  in: path
                  type: string
                  required: true
                - name: date
                  in: path
                  type: string
                  required: true
      authentication:
        type: apikey
        key: X-API-KEY
        value: '{{env.TRACK_POD_API_KEY}}'
        placement: header
  exposes:
    - type: mcp
      namespace: vehicle-checks-mcp
      port: 9090
      transport: http
      description: MCP adapter for Track-POD VehicleCheck.
      tools:
        - name: track-pod-get-last-vehicle-check
          description: Get the most recent walk-around inspection for a vehicle
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: vehicle-checks.getLastVehicleCheck
          with:
            number: tools.number
        - name: track-pod-get-vehicle-checks-by-date
          description: Get all vehicle inspections for a given date
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: vehicle-checks.getVehicleChecksByDate
          with:
            date: tools.date
