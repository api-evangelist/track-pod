notes:
  - All plans include route optimization, live tracking, proof of delivery, geofencing, the driver mobile app, analytics, 5,000+ integrations, and API access.
  - The driver mobile app is free to download on iOS and Android; the web dispatcher dashboard requires a paid subscription.
  - Annual billing is invoiced up front at a lower per-driver rate; monthly billing is at a higher per-driver rate.
