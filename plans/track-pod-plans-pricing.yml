        name: driver_seat_annual
        type: fixed
        metric: drivers
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '49.00'
        userMultiplied: true
      - label: Per Driver (monthly billing)
        name: driver_seat_monthly
        type: fixed
        metric: drivers
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '59.00'
        userMultiplied: true
